experiment:
  name: simple_dak_ucb
  task: image_captioning  # image_captioning | image_generation | llm_prompting
  objective: I-JRKE  # I-JRKE | JKD

data:
  input: input_dataset/images
  output: target_dataset/prompts.txt
  generated: generated_output

routing:
  random: false
  mix: false
  pak: false
  onearm: false
  oracle_choice: 0

hyperparameters:
  constant: 1e-4
  runs: 1
  delta: 3.8
  alpha: 1.0
  gamma: 1.0
  lambd: 1.0

models:
  captioning:
    - name: caption_model_a
    - name: caption_model_b
  generation:
    - name: image_model_a
    - name: image_model_b
  llm:
    - name: llm_model_a

runtime:
  use_mock: true
  seed: 42
  result_file: results.json
