# DAK-UCB configuration

experiment:
  name: Image-Captioning
  algorithm: DAK-UCB
  objective: I-JRKE  # or JKD
  task: image_captioning  # image_generation | image_captioning | llm_prompting
  task_model_count:
    image_generation: 2
    image_captioning: 3
    llm_prompting: 0
  input:
    image_dir: input_dataset/images
    text_file: input_dataset/prompts.txt
  output:
    image_dir: output_dataset/images
    text_file: output_dataset/prompts.txt

modes:
  random: false
  onearm: false
  pak: false
  mix: false
  oracle_choice: 0

hyperparams:
  constant: 1e-4
  runs: 2
  iterations: 3
  prompt_feature_count: 512
  image_feature_count: 768
  delta: 5.8
  alpha: 1.0
  gamma: 1.0
  lambd: 1.0

models:
  image_generation:
    - name: kandinsky
      type: kandinsky
      model_id: kandinsky-community/kandinsky-2-2-decoder
      prior_id: kandinsky-community/kandinsky-2-2-prior
    - name: sdxl
      type: sdxl
      model_id: stabilityai/stable-diffusion-xl-base-1.0
  captioning:
    - name: blip2
      type: blip2
      model_id: Salesforce/blip2-flan-t5-xl
    - name: instructblip
      type: instructblip
      model_id: Salesforce/instructblip-flan-t5-xl
    - name: llava
      type: llava
      model_id: llava-hf/llava-1.5-7b-hf
  llm:
  embeddings:
    clip_model_id: openai/clip-vit-large-patch14
    dinov2_model_id: facebook/dinov2-base

runtime:
  use_mock_data: true
  seed: 42
  device: cpu
